<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
    (function() {
      var userAgent = navigator.userAgent.toLowerCase();
      var currentUrl = window.location.href;

      var isInAppBrowser = /kakaotalk|naver|instagram|fbav|fb_iab/i.test(userAgent);

      if (isInAppBrowser) {
        var isAndroid = /android/i.test(userAgent);
        var isIOS = /iphone|ipad|ipod/i.test(userAgent);

        if (/kakaotalk/i.test(userAgent)) {
          window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(currentUrl);
        } else if (isAndroid) {
          var intentUrl = 'intent://' + currentUrl.replace(/https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end';
          window.location.href = intentUrl;
        } else if (isIOS) {
          document.addEventListener('DOMContentLoaded', function() {
            var guideHtml =
              '<div id="browserGuide" style="' +
              'position:fixed;top:0;left:0;right:0;bottom:0;' +
              'background:rgba(0,0,0,0.8);z-index:9999;' +
              'display:flex;align-items:center;justify-content:center;">' +
              '<div style="' +
              'background:white;padding:30px;border-radius:12px;' +
              'max-width:320px;text-align:center;margin:20px;">' +
              '<h3 style="margin-bottom:15px;font-size:18px;">외부 브라우저에서 열어주세요</h3>' +
              '<p style="color:#666;font-size:14px;line-height:1.6;margin-bottom:20px;">' +
              'AR 기능은 보안상의 이유로<br>인앱 브라우저에서 지원되지 않습니다.<br><br>' +
              '<strong>우측 상단 메뉴(⋮)에서<br>"다른 브라우저로 열기"를 선택해주세요.</strong>' +
              '</p>' +
              '<button onclick="document.getElementById(\'browserGuide\').style.display=\'none\'" ' +
              'style="background:#4285f4;color:white;border:none;' +
              'padding:12px 30px;border-radius:6px;cursor:pointer;font-size:14px;">' +
              '확인' +
              '</button>' +
              '</div>' +
              '</div>';
            document.body.insertAdjacentHTML('beforeend', guideHtml);
          });
        }
      }
    })();
  </script>

  <title>더가이즈</title>
  <meta itemprop="name" content="더가이즈">
  <meta name="twitter:title" content="더가이즈">
  <meta property="og:title" content="더가이즈">
  <meta property="og:site_name" content="더가이즈">

  <meta name="twitter:description" content="">
  <!-- DEBUG PANEL - 임시, 나중에 제거 -->
  <script>
    (function() {
      var panel = document.createElement('div');
      panel.id = 'debug-panel';
      panel.style.cssText = [
        'position:fixed', 'bottom:0', 'left:0', 'right:0',
        'height:35vh', 'background:rgba(0,0,0,0.85)', 'color:#0f0',
        'font-size:11px', 'font-family:monospace', 'z-index:99999',
        'overflow-y:auto', 'padding:4px', 'pointer-events:auto',
      ].join(';');

      var toggle = document.createElement('button');
      toggle.textContent = 'DEBUG ▼';
      toggle.style.cssText = [
        'position:fixed', 'bottom:35vh', 'right:0',
        'background:#333', 'color:#0f0', 'border:none',
        'font-size:11px', 'padding:4px 8px', 'z-index:99999',
        'cursor:pointer',
      ].join(';');

      var visible = true;
      toggle.onclick = function() {
        visible = !visible;
        panel.style.display = visible ? 'block' : 'none';
        toggle.style.bottom = visible ? '35vh' : '0';
        toggle.textContent = visible ? 'DEBUG ▼' : 'DEBUG ▲';
      };

      document.addEventListener('DOMContentLoaded', function() {
        document.body.appendChild(panel);
        document.body.appendChild(toggle);
      });

      var addLog = function(type, args) {
        var line = document.createElement('div');
        var text = Array.from(args).map(function(a) {
          try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
          catch(e) { return String(a); }
        }).join(' ');
        line.style.color = type === 'error' ? '#f66' : type === 'warn' ? '#fa0' : '#0f0';
        line.textContent = '[' + type.toUpperCase() + '] ' + text;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
      };

      ['log', 'warn', 'error'].forEach(function(type) {
        var orig = console[type].bind(console);
        console[type] = function() {
          orig.apply(console, arguments);
          addLog(type, arguments);
        };
      });

      window.addEventListener('unhandledrejection', function(e) {
        addLog('error', ['UnhandledPromise: ' + (e.reason && e.reason.message || e.reason)]);
      });
    })();
  </script>
  <!-- /DEBUG PANEL -->

  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>
